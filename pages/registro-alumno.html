<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinnos — Registro de Alumno</title>
  <link rel="stylesheet" href="../css/login.css">
  <style>
    .card { max-width: 420px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; color: #94a3b8; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .form-group input {
      letter-spacing: 0;
      font-size: 0.9rem;
      padding: 10px 14px;
    }
    .success {
      margin-top: 16px; padding: 12px 16px; border-radius: 8px;
      background: #14532d; border: 1px solid #166534; color: #86efac;
      font-size: 0.875rem; display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      color: #64748b; font-size: .85rem; text-decoration: none;
    }
    .back-link:hover { color: #6366f1; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Kin<span>nos</span></h1>
    <p>Registro de Alumno</p>
  </div>

  <div id="form-container">
    <div class="grid-2">
      <div class="form-group" style="grid-column:1/-1">
        <label>Nombre completo *</label>
        <input type="text" id="reg-nombre" placeholder="Ej: Juan Pérez">
      </div>
      <div class="form-group">
        <label>DNI *</label>
        <input type="text" id="reg-dni" placeholder="Ej: 40123456" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="reg-telefono" placeholder="Ej: 2604 123456">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Ej: juan@gmail.com">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Institución *</label>
        <select id="reg-inst">
          <option value="">Cargando instituciones…</option>
        </select>
      </div>
    </div>

    <button id="btn-registrar" onclick="registrar()">Registrarme</button>
    <div class="error" id="error-msg"></div>
  </div>

  <div id="exito-container" style="display:none;text-align:center;padding:16px 0">
    <div style="font-size:2.5rem;margin-bottom:16px">✅</div>
    <p style="color:#f8fafc;font-weight:600;font-size:1.05rem;margin-bottom:8px">¡Registro exitoso!</p>
    <p style="color:#64748b;font-size:.875rem;margin-bottom:20px">
      Ya podés ingresar con tu DNI y explorar las materias de tu institución.
    </p>
    <a href="index.html" style="display:inline-block;padding:10px 24px;background:#6366f1;color:#fff;border-radius:8px;text-decoration:none;font-weight:600">
      Ingresar ahora
    </a>
  </div>

  <a class="back-link" href="index.html">← Volver al inicio de sesión</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../js/sb.js"></script>
<script>
  // Cargar instituciones al iniciar
  (async () => {
    const { data: insts } = await sb.from('institutions').select('id, name').order('name');
    const sel = document.getElementById('reg-inst');
    if (!insts?.length) {
      sel.innerHTML = '<option value="">Sin instituciones disponibles</option>';
      return;
    }
    sel.innerHTML = '<option value="">Seleccioná tu institución *</option>' +
      insts.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
  })();

  async function registrar() {
    const btn    = document.getElementById('btn-registrar');
    const errEl  = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const nombre      = document.getElementById('reg-nombre').value.trim();
    const dni         = document.getElementById('reg-dni').value.trim();
    const email       = document.getElementById('reg-email').value.trim();
    const telefono    = document.getElementById('reg-telefono').value.trim();
    const instId      = document.getElementById('reg-inst').value;

    if (!nombre) { mostrarError('El nombre es obligatorio.'); return; }
    if (!dni)    { mostrarError('El DNI es obligatorio.'); return; }
    if (!instId) { mostrarError('Seleccioná tu institución.'); return; }

    btn.disabled = true;
    btn.textContent = 'Registrando…';

    const { data: existe } = await sb.from('students').select('id').eq('dni', dni).maybeSingle();
    if (existe) {
      mostrarError('Ese DNI ya está registrado. Podés ingresar directamente.');
      btn.disabled = false; btn.textContent = 'Registrarme';
      return;
    }

    const { error } = await sb.from('students').insert({
      full_name: nombre, dni, email: email || null, phone: telefono || null,
      institution_id: instId,
    });

    btn.disabled = false;
    btn.textContent = 'Registrarme';

    if (error) { mostrarError('Error al registrar: ' + error.message); return; }

    document.getElementById('form-container').style.display = 'none';
    document.getElementById('exito-container').style.display = 'block';
  }

  function mostrarError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
