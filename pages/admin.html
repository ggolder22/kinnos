<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinnos — Admin</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Kin<span>nos</span></h1>
      <small>Super Admin</small>
    </div>
    <nav>
      <div class="nav-section">Gestión</div>
      <div class="nav-item active" id="nav-inst" onclick="showPage('instituciones')">
        <span class="icon">🏫</span> Instituciones
      </div>
      <div class="nav-item" id="nav-prof" onclick="showPage('profesores')">
        <span class="icon">👨‍🏫</span> Profesores
      </div>
      <div class="nav-item" id="nav-alumnos" onclick="showPage('alumnos')">
        <span class="icon">👥</span> Alumnos
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%" onclick="Auth.logout()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menú">&#9776;</button>
      <h2 id="topbar-title" style="flex:1">Instituciones</h2>
      <div class="topbar-right">
        <span id="admin-greeting"></span>
      </div>
    </div>

    <!-- Página: Instituciones / Carreras / Materias (drill-down) -->
    <div class="page active" id="page-instituciones">
      <div class="breadcrumb" id="inst-breadcrumb"></div>
      <div id="inst-content"><div class="loading">Cargando…</div></div>
    </div>

    <!-- Página: Profesores -->
    <div class="page" id="page-profesores">
      <div id="prof-content"><div class="loading">Cargando…</div></div>
    </div>

    <!-- Página: Alumnos -->
    <div class="page" id="page-alumnos">
      <div id="alumnos-content"><div class="loading">Cargando…</div></div>
    </div>
  </div>

</div><!-- /app -->

<div class="drawer-backdrop" onclick="closeDrawer()"></div>

<!-- ── Toast ── -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════
     MODALES
════════════════════════════════════════════ -->

<!-- Modal: Institución -->
<div class="modal-backdrop hidden" id="inst-modal">
  <div class="modal">
    <h4 id="inst-modal-title">Nueva institución</h4>
    <input type="hidden" id="inst-modal-id">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="inst-modal-name" placeholder="Ej: Instituto Politécnico San Martín">
    </div>
    <div class="form-group">
      <label>Dirección</label>
      <input type="text" id="inst-modal-addr" placeholder="Ej: Av. Córdoba 1234, Mendoza">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminInstitutions.closeInstModal()">Cancelar</button>
      <button class="btn btn-primary" id="inst-modal-save" onclick="AdminInstitutions.saveInst()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Carrera -->
<div class="modal-backdrop hidden" id="carrera-modal">
  <div class="modal">
    <h4 id="carrera-modal-title">Nueva carrera</h4>
    <input type="hidden" id="carrera-modal-id">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="carrera-modal-name" placeholder="Ej: Técnico en Electrotecnia">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="carrera-modal-desc" placeholder="Descripción opcional…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminInstitutions.closeCarreraModal()">Cancelar</button>
      <button class="btn btn-primary" id="carrera-modal-save" onclick="AdminInstitutions.saveCarrera()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Materia -->
<div class="modal-backdrop hidden" id="materia-modal">
  <div class="modal">
    <h4 id="materia-modal-title">Nueva materia</h4>
    <input type="hidden" id="materia-modal-id">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="materia-modal-name" placeholder="Ej: Electrónica Aplicada">
    </div>
    <div class="form-group">
      <label>Año del plan</label>
      <input type="number" id="materia-modal-year" placeholder="Ej: 3" min="1" max="6">
    </div>
    <p style="font-size:.8rem;color:var(--text-3);margin-top:-8px">
      El código de inscripción se genera automáticamente.
    </p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminInstitutions.closeMateriaModal()">Cancelar</button>
      <button class="btn btn-primary" id="materia-modal-save" onclick="AdminInstitutions.saveMateria()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Profesor -->
<div class="modal-backdrop hidden" id="prof-modal">
  <div class="modal">
    <h4 id="prof-modal-title">Nuevo profesor</h4>
    <input type="hidden" id="prof-modal-id">
    <div class="form-group">
      <label>Nombre completo *</label>
      <input type="text" id="prof-modal-name" placeholder="Ej: María González">
    </div>
    <div class="form-group">
      <label>DNI *</label>
      <input type="text" id="prof-modal-dni" placeholder="Ej: 28450123" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="prof-modal-email" placeholder="Ej: maria@escuela.edu.ar">
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" id="prof-modal-phone" placeholder="Ej: 2604 123456">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminProfessors.closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="prof-modal-save" onclick="AdminProfessors.save()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Alumno -->
<div class="modal-backdrop hidden" id="alumno-modal">
  <div class="modal">
    <h4 id="alumno-modal-title">Nuevo alumno</h4>
    <input type="hidden" id="alumno-modal-id">
    <div class="form-group">
      <label>Nombre completo *</label>
      <input type="text" id="alumno-modal-name" placeholder="Ej: Juan Pérez">
    </div>
    <div class="form-group">
      <label>DNI *</label>
      <input type="text" id="alumno-modal-dni" placeholder="Ej: 40123456" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="alumno-modal-email" placeholder="Ej: juan@gmail.com">
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" id="alumno-modal-phone" placeholder="Ej: 2604 123456">
    </div>
    <div class="form-group">
      <label>Institución</label>
      <select id="alumno-modal-inst">
        <option value="">Sin institución asignada</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminAlumnos.closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="alumno-modal-save" onclick="AdminAlumnos.save()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Asignar materias a profesor -->
<div class="modal-backdrop hidden" id="asign-modal">
  <div class="modal" style="max-width:560px">
    <h4 id="asign-modal-title">Materias del profesor</h4>
    <div id="asign-list" style="max-height:360px;overflow-y:auto"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="AdminProfessors.closeAsignModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../js/sb.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin/institutions.js"></script>
<script src="../js/admin/professors.js"></script>
<script src="../js/admin/alumnos.js"></script>

<script>
  if (!Auth.require('admin')) throw new Error('no-auth');

  const session = Auth.session();
  document.getElementById('admin-greeting').textContent = `DNI ${session.dni}`;

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    document.querySelectorAll('.modal-backdrop:not(.hidden)').forEach(m => m.classList.add('hidden'));
  });

  document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) backdrop.classList.add('hidden');
    });
  });

  const navIds = { instituciones: 'inst', profesores: 'prof', alumnos: 'alumnos' };
  const titles  = { instituciones: 'Instituciones', profesores: 'Profesores', alumnos: 'Alumnos' };

  function showPage(nombre) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`nav-${navIds[nombre]}`).classList.add('active');

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${nombre}`).classList.add('active');

    document.getElementById('topbar-title').textContent = titles[nombre];

    if (nombre === 'instituciones') AdminInstitutions.init();
    if (nombre === 'profesores')    AdminProfessors.init();
    if (nombre === 'alumnos')       AdminAlumnos.init();
  }

  showPage('instituciones');

  function toggleDrawer() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.querySelector('.drawer-backdrop').classList.toggle('visible');
  }
  function closeDrawer() {
    document.querySelector('.sidebar').classList.remove('open');
    document.querySelector('.drawer-backdrop').classList.remove('visible');
  }
  document.querySelector('.sidebar nav').addEventListener('click', () => {
    if (window.innerWidth <= 768) closeDrawer();
  });
</script>

</body>
</html>
