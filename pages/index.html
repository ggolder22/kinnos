<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinnos — Acceso</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Kin<span>nos</span></h1>
    <p>Plataforma educativa</p>
  </div>

  <label for="dni">Número de DNI</label>
  <input type="text" id="dni" placeholder="Ej: 12345678" maxlength="12" inputmode="numeric">

  <button id="btn-ingresar" onclick="login()">Ingresar</button>
  <div class="spinner" id="spinner"></div>
  <div class="error" id="error-msg"></div>
  <div style="display:flex;justify-content:center;gap:24px;margin-top:20px">
    <a href="registro-alumno.html"   style="color:#64748b;font-size:.82rem;text-decoration:none">¿Alumno nuevo? Registrate</a>
    <a href="registro-profesor.html" style="color:#64748b;font-size:.82rem;text-decoration:none">¿Sos profesor? Registrate</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('dni').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const dni = document.getElementById('dni').value.trim();
    const btn = document.getElementById('btn-ingresar');
    const spinner = document.getElementById('spinner');
    const errorEl = document.getElementById('error-msg');

    errorEl.style.display = 'none';

    if (!dni) {
      mostrarError('Ingresá tu DNI para continuar.');
      return;
    }

    btn.disabled = true;
    btn.style.display = 'none';
    spinner.style.display = 'block';

    try {
      // 1. Super Admin
      if (dni === SUPER_ADMIN_DNI) {
        sessionStorage.setItem('kinnos_rol', 'admin');
        sessionStorage.setItem('kinnos_dni', dni);
        window.location.href = 'admin.html';
        return;
      }

      // 2. Profesor
      const { data: prof } = await sb
        .from('professors')
        .select('id, full_name, dni, status')
        .eq('dni', dni)
        .maybeSingle();

      if (prof) {
        if (prof.status === 'pending') {
          mostrarError('Tu solicitud está pendiente de aprobación. Te avisaremos cuando esté lista.');
          return;
        }
        if (prof.status === 'rejected') {
          mostrarError('Tu solicitud fue rechazada. Contactá al administrador.');
          return;
        }
        sessionStorage.setItem('kinnos_rol', 'profesor');
        sessionStorage.setItem('kinnos_dni', dni);
        sessionStorage.setItem('kinnos_id', prof.id);
        sessionStorage.setItem('kinnos_nombre', prof.full_name);
        window.location.href = 'profesor.html';
        return;
      }

      // 3. Alumno
      const { data: alumno } = await sb
        .from('students')
        .select('id, full_name, dni')
        .eq('dni', dni)
        .maybeSingle();

      if (alumno) {
        sessionStorage.setItem('kinnos_rol', 'alumno');
        sessionStorage.setItem('kinnos_dni', dni);
        sessionStorage.setItem('kinnos_id', alumno.id);
        sessionStorage.setItem('kinnos_nombre', alumno.full_name);
        window.location.href = 'alumno.html';
        return;
      }

      mostrarError('DNI no encontrado. Verificá el número o registrate primero.');

    } catch (err) {
      mostrarError('Error de conexión. Intentá de nuevo.');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.style.display = 'block';
      spinner.style.display = 'none';
    }
  }

  function mostrarError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
