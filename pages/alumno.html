<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinnos — Alumno</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/alumno.css">
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Kin<span>nos</span></h1>
      <small>Alumno</small>
    </div>
    <nav>
      <!-- Unirse / Explorar materias -->
      <div class="join-form">
        <button class="btn btn-primary" style="width:100%;padding:8px;margin-bottom:8px" onclick="AlumnoMaterias.explorar()">
          + Explorar materias
        </button>
        <input type="text" id="join-code-input" placeholder="Tengo un código…" maxlength="10"
          onkeydown="if(event.key==='Enter') AlumnoMaterias.unirse()">
        <button class="btn btn-ghost" style="width:100%;padding:7px;font-size:.8rem" onclick="AlumnoMaterias.unirse()">
          Ingresar con código
        </button>
      </div>
      <div class="nav-section">Mis Materias</div>
      <div id="sidebar-materias"><div style="padding:12px 20px;font-size:.8rem;color:var(--text-3)">Cargando…</div></div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%" onclick="Auth.logout()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menú">&#9776;</button>
      <div style="flex:1;min-width:0">
        <h2 id="topbar-materia" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Seleccioná una materia</h2>
        <div id="topbar-sub" class="topbar-sub"></div>
      </div>
      <div class="topbar-right">
        <span id="alumno-greeting"></span>
      </div>
    </div>

    <!-- Banner de novedades / bienvenida (siempre visible al seleccionar materia) -->
    <div id="novedades-banner" class="hidden"></div>

    <div class="tabs-bar hidden" id="tabs-bar">
      <div class="tab" data-tab="unidades" onclick="showTab('unidades')">Unidades</div>
      <div class="tab" data-tab="examenes" onclick="showTab('examenes')">Exámenes</div>
    </div>

    <!-- Bienvenida -->
    <div class="page active" id="page-bienvenida">
      <div class="empty-state" style="margin-top:80px">
        <div class="icon">👈</div>
        <p>Seleccioná una materia o ingresá un código para unirte.</p>
      </div>
    </div>

    <div class="page" id="page-unidades">
      <div id="unidades-content"></div>
    </div>

    <div class="page" id="page-examenes">
      <div id="examenes-content"></div>
    </div>

  </div>

</div><!-- /app -->

<div class="drawer-backdrop" onclick="closeDrawer()"></div>

<!-- ── Toast ── -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════
     MODAL: Explorar materias
════════════════════════════════════════════ -->
<div class="modal-backdrop hidden" id="explorar-modal">
  <div class="modal" style="max-width:580px">
    <h4>Materias de mi institución</h4>
    <div id="explorar-content" style="max-height:60vh;overflow-y:auto;margin-top:8px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('explorar-modal').classList.add('hidden')">Cerrar</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     MODAL: Visor PDF
════════════════════════════════════════════ -->
<div class="modal-backdrop hidden" id="pdf-modal">
  <div class="modal" style="max-width:860px;width:95vw;height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)">
      <span id="pdf-modal-titulo" style="font-weight:600;font-size:.95rem;color:var(--text-1)"></span>
      <div style="display:flex;gap:8px">
        <a id="pdf-modal-download" href="#" download target="_blank" rel="noopener" class="btn btn-ghost btn-sm">⬇ Descargar</a>
        <button class="btn btn-ghost btn-sm" onclick="AlumnoUnidades.closePdf()">✕</button>
      </div>
    </div>
    <iframe id="pdf-modal-frame" src="" style="flex:1;width:100%;border:none;background:#fff"></iframe>
  </div>
</div>

<!-- ════════════════════════════════════════════
     MODAL: Ejercicios
════════════════════════════════════════════ -->
<div class="modal-backdrop hidden" id="ejercicios-modal">
  <div class="modal modal-ejercicios">
    <div class="ej-modal-header">
      <div>
        <h4 id="ejercicios-modal-title" style="margin:0">Ejercicios</h4>
        <div class="ej-progress-wrap">
          <div class="ej-progress-bar-bg">
            <div class="ej-progress-bar-fill" id="ejercicios-progress-bar" style="width:0%"></div>
          </div>
          <span id="ejercicios-progress-text" class="ej-progress-text">0 / 0 completados</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="AlumnoEjercicios.cerrar()">✕</button>
    </div>

    <div id="ejercicios-body" style="min-height:180px;padding:20px 24px"></div>

    <div class="ej-modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="AlumnoEjercicios.imprimir()">🖨 Imprimir / PDF</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" id="ej-prev-btn" onclick="AlumnoEjercicios.anterior()" disabled>← Anterior</button>
        <button class="btn btn-primary btn-sm" id="ej-next-btn" onclick="AlumnoEjercicios.siguiente()" disabled>Siguiente →</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     OVERLAY DE EXAMEN
════════════════════════════════════════════ -->
<div id="exam-overlay">
  <div class="exam-overlay-header">
    <h2 id="exam-overlay-titulo"></h2>
    <button class="btn btn-ghost btn-sm" onclick="AlumnoExamenes.cerrarOverlay()">✕ Salir</button>
  </div>

  <div class="exam-body">
    <div id="exam-form-view">
      <p id="exam-instrucciones" style="color:var(--text-2);font-size:.9rem;margin-bottom:24px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px"></p>
      <div id="exam-preguntas"></div>
      <div style="text-align:center;margin-top:24px">
        <button class="btn btn-primary" style="min-width:200px" onclick="AlumnoExamenes.enviar()">
          Entregar examen
        </button>
      </div>
    </div>
    <div id="exam-result-view" style="display:none"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../js/sb.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/alumno/materias.js"></script>
<script src="../js/alumno/unidades.js"></script>
<script src="../js/alumno/novedades.js"></script>
<script src="../js/alumno/examenes.js"></script>
<script src="../js/alumno/ejercicios.js"></script>

<script>
  if (!Auth.require('alumno')) throw new Error('no-auth');

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    document.querySelectorAll('.modal-backdrop:not(.hidden)').forEach(m => m.classList.add('hidden'));
    if (!document.getElementById('pdf-modal').classList.contains('hidden')) {
      document.getElementById('pdf-modal-frame').src = '';
    }
  });
  document.getElementById('ejercicios-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) AlumnoEjercicios.cerrar();
  });
  document.getElementById('explorar-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
  });
  document.getElementById('pdf-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.add('hidden');
      document.getElementById('pdf-modal-frame').src = '';
    }
  });

  function showTab(nombre) {
    AlumnoState.seccion = nombre;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === nombre));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${nombre}`).classList.add('active');
    const modulos = { unidades: AlumnoUnidades, examenes: AlumnoExamenes };
    modulos[nombre]?.init();
  }

  AlumnoMaterias.init();

  function toggleDrawer() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.querySelector('.drawer-backdrop').classList.toggle('visible');
  }
  function closeDrawer() {
    document.querySelector('.sidebar').classList.remove('open');
    document.querySelector('.drawer-backdrop').classList.remove('visible');
  }
  document.querySelector('.sidebar nav').addEventListener('click', () => {
    if (window.innerWidth <= 768) closeDrawer();
  });
</script>

<!-- Print: Ejercicios (solo visible al imprimir) -->
<div id="ejercicios-print-body"></div>

</body>
</html>
